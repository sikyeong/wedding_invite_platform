ot;id&quot;:179702,&quot;writer&quot;:&quot;\ud61c\ubc0d\uc774&quot;,&quot;message&quot;:&quot;\uc5b8\ub2c8\uc789 \ud83d\udc96\ud83e\udef6\ud83d\udc96\ud83e\udef6\ud83d\udc96\ud83e\udef6 \uc5b8\ub2c8\uac00 \uacb0\ud63c\uc774\ub77c\ub2c8!!!! \uc2dc\uac04\uc774\ubc8c\uc368..! \ub118\ub118 \ucd95\ud558\ud574 \uc9c4\ud638\uc624\ube60\ub791 \ud589\ubcf5\ud558\uac8c \uc798\uc0b4\uc5b4 \ud83e\udd70 \uc55e\uc73c\ub85c \ub354\ub354\ub354\ub354 \uaf43\uae38\ub9cc \uac77\uc7c8 \u2728&quot;,&quot;createdAt&quot;:&quot;2025\ub144 7\uc6d4 28\uc77c&quot;,&quot;isPrivate&quot;:false},{&quot;id&quot;:179701,&quot;writer&quot;:&quot;\ucd5c\uc740\uc218&quot;,&quot;message&quot;:&quot;\ud83c\udf89 \uc9c4\ud638\ub2d8! \ub098\uc740\ub2d8! \ub4dc\ub514\uc5b4 \ud604\uc2e4\ud310 \ub85c\ub9e8\uc2a4 \uc601\ud654 \uac1c\ubd09\uc778\uac00\uc694?! \ud83c\udfac \ub450 \ubd84, \uc9c4\uc9dc \ucc9c\uc0dd\uc5f0\ubd84\uc774\ub2c8\uae4c \ud589\ubcf5\ub9cc \ud558\uc138\uc694~ \ucb49\ucb49\ucb49! \ud83d\udc96&quot;,&quot;createdAt&quot;:&quot;2025\ub144 7\uc6d4 28\uc77c&quot;,&quot;isPrivate&quot;:false}],&quot;interview&quot;:{&quot;enabled&quot;:true,&quot;title&quot;:&quot;\uc6b0\ub9ac \ub450 \uc0ac\ub78c\uc758 \uc774\uc57c\uae30&quot;,&quot;description&quot;:&quot;\uacb0\ud63c\uc744 \uc55e\ub450\uace0 \uc800\ud76c \ub450 \uc0ac\ub78c\uc758\n\uc778\ud130\ubdf0\ub97c \uc900\ube44\ud588\uc2b5\ub2c8\ub2e4.&quot;,&quot;images&quot;:[&quot;https:\/\/images.theirmood.com\/resources\/46097\/card\/dXHF8IHgPT\/QNZXIyDtMk.png&quot;,&quot;https:\/\/images.theirmood.com\/resources\/46097\/card\/dXHF8IHgPT\/Aw790r94ks.png&quot;],&quot;list&quot;:[{&quot;id&quot;:10947,&quot;title&quot;:&quot;Q1. \uc2e0\ub791 \uc2e0\ubd80\ub97c \uc18c\uac1c\ud574\uc8fc\uc138\uc694&quot;,&quot;description&quot;:&quot;\ud83d\udc66 \uc2e0\ub791 \uae40\uc9c4\ud638 (ISTJ)\n\uacc4\ud68d\uc740 \ucca0\uc800, \uac10\uc815 \ud45c\ud604\uc740 \uc11c\ud234\uc9c0\ub9cc \uc9c4\uc2ec\uc740 \uae4a\uc740 \uc0ac\ub78c\uc785\ub2c8\ub2e4.\n\uc791\uc740 \uc57d\uc18d\ub3c4 \uc78a\uc9c0 \uc54a\uace0 \ucc59\uae30\uace0, \ud63c\uc7a3\ub9d0\uc778 \uc904 \uc54c\uc558\ub358 \uc81c \ud22c\uc815\ub3c4 \uae30\uc5b5\ud558\ub354\ub77c\uace0\uc694.\n\ub9d0\uc218\uac00 \uc801\uc5b4 \uc624\ud574\ubc1b\uae30\ub3c4 \ud558\uc9c0\ub9cc, \ubb35\ubb35\ud788 \ud589\ub3d9\uc73c\ub85c \ubcf4\uc5ec\uc8fc\ub294 \uc2a4\ud0c0\uc77c\uc774\uc5d0\uc694.\n\u2018\uace0\uc7a5 \ub09c \uc804\uad6c\ub3c4 \uc2a4\uc2a4\ub85c \uac08\uc544\ub07c\uc6b0\ub294 \ub0a8\uc790\u2019\ub77c\ub294 \ub9d0, \uc9c4\ud638\ub97c \uc704\ud574 \uc788\ub294 \ub9d0 \uc544\ub2d0\uae4c\uc694? \ud83d\ude0e\n\uc2e0\ubd80\uc5d0\uac8c\ub294 \uc5b8\uc81c\ub098 \&quot;\uadf8\ub798~\&quot;\ub85c \ub05d\ub9fa\ub294 \ub4e0\ub4e0\ud55c \ub0a8\uc790\uc785\ub2c8\ub2e4 \ud83d\udcaa\ud83e\udd0d\n\n\ud83d\udc70 \uc2e0\ubd80 \uc774\ub098\uc740 (ENFP)\n\ud558\ub8e8\uc5d0\ub3c4 \uc5f4\ub450 \ubc88 \uc6c3\uace0 \uc6b8\uace0 \ub5a0\ub4dc\ub294 \uac10\uc131 \uc5d4\uc9c4\uc785\ub2c8\ub2e4 \ud83d\ude80\n\uc720\uba38\uc640 \uc5d0\ub108\uc9c0\ub85c \ubd84\uc704\uae30\ub97c \ud658\ud558\uac8c \ubc1d\ud788\uace0, \ucd08\uba74\uc5d0\ub3c4 \uc778\uc0dd \uc598\uae30 \ub098\ub204\ub294 \uc2a4\ud0c0\uc77c\uc774\uc5d0\uc694.\n\ud63c\uc7a3\ub9d0\uc5d0 \uc9c4\uc9c0\ud558\uac8c \ub300\ub2f5\ud574\uc8fc\ub294 \uc9c4\ud638\uc640 \uc798 \ub9de\ub294 \uc774\uc720\uc8e0.\n\uc989\ud765 \uc5ec\ud589\uc744 \uc88b\uc544\ud558\uc9c0\ub9cc \uc911\uc694\ud55c \uac74 \ud56d\uc0c1 \uc9d1\uc5d0 \ubb34\uc0ac \uadc0\ud658!\n\ub0ad\ub9cc\uacfc \ud604\uc2e4\uc744 \ub118\ub098\ub4e4\uba70 \uc624\ub298\ub3c4 \uc9c4\ud638\ub97c \uc6c3\uac8c \ud558\ub294, \uadc0\uc5fd\uace0 \ub2e8\ub2e8\ud55c \uc0ac\ub78c\uc785\ub2c8\ub2e4 \ud83c\udf38\ud83d\ude0c&quot;},{&quot;id&quot;:10948,&quot;title&quot;:&quot;Q2. \ub450 \ubd84\uc740 \uc5b4\ub5bb\uac8c \ub9cc\ub098\uac8c \ub418\uc5c8\ub098\uc694?&quot;,&quot;description&quot;:&quot;\uc11c\ub85c\uc758 \uc774\ub984\ub3c4 \ubab0\ub790\ub358 \uc5b4\ub290 \ub0a0, \uc9c0\uc778\uc758 \ubaa8\uc784\uc
