<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>청첩장 갤러리 확대 모달 데모</title>
    <link rel="stylesheet" href="./gallery-modal.css" />
  </head>
  <body>
    <main class="page">
      <h1>청첩장 갤러리 확대 보기</h1>
      <p>사진을 누르면 한 장씩 크게 보이는 전체화면 모달이 열립니다.</p>
      <div id="thumbGrid" class="thumb-grid"></div>
    </main>

    <section id="zoomModal" class="zoom-modal" aria-hidden="true">
      <div class="inner">
        <div class="head">
          <button id="zoomClose" class="close" type="button" aria-label="닫기">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M4.21967 4.21991C4.51256 3.92702 4.98744 3.92702 5.28033 4.21991L12 10.9396L18.7197 4.21991C19.0126 3.92702 19.4874 3.92702 19.7803 4.21991C20.0732 4.51281 20.0732 4.98768 19.7803 5.28057L13.0607 12.0002L19.7803 18.7199C20.0732 19.0128 20.0732 19.4877 19.7803 19.7806C19.4874 20.0735 19.0126 20.0735 18.7197 19.7806L12 13.0609L5.28033 19.7806C4.98744 20.0735 4.51256 20.0735 4.21967 19.7806C3.92678 19.4877 3.92678 19.0128 4.21967 18.7199L10.9393 12.0002L4.21967 5.28057C3.92678 4.98768 3.92678 4.51281 4.21967 4.21991Z" fill="#1a1a1a"></path>
            </svg>
          </button>
        </div>

        <div class="image-container">
          <img id="zoomImage" src="" alt="확대 이미지" />
        </div>

        <div class="func-wrap">
          <button id="zoomPrev" class="nav-btn" type="button" aria-label="이전">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M14.5303 5.46967C14.8232 5.76256 14.8232 6.23744 14.5303 6.53033L9.06066 12L14.5303 17.4697C14.8232 17.7626 14.8232 18.2374 14.5303 18.5303C14.2374 18.8232 13.7626 18.8232 13.4697 18.5303L7.46967 12.5303C7.17678 12.2374 7.17678 11.7626 7.46967 11.4697L13.4697 5.46967C13.7626 5.17678 14.2374 5.17678 14.5303 5.46967Z" fill="#1a1a1a"></path>
            </svg>
          </button>

          <div class="count">
            <span id="currentIndex">1</span>
            <span>/</span>
            <span id="totalCount">1</span>
          </div>

          <button id="zoomNext" class="nav-btn" type="button" aria-label="다음">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M8.46967 5.46967C8.76256 5.17678 9.23744 5.17678 9.53033 5.46967L15.5303 11.4697C15.8232 11.7626 15.8232 12.2374 15.5303 12.5303L9.53033 18.5303C9.23744 18.8232 8.76256 18.8232 8.46967 18.5303C8.17678 18.2374 8.17678 17.7626 8.46967 17.4697L13.9393 12L8.46967 6.53033C8.17678 6.23744 8.17678 5.76256 8.46967 5.46967Z" fill="#1a1a1a"></path>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <script src="./gallery-modal.js"></script>
  </body>
</html>
